name = "replace-worker-name"
main = "src/auth-worker.ts"
compatibility_date = "2026-04-29"
account_id = "replace-cloudflare-account-id"

workers_dev = false

routes = [
  { pattern = "replace.example.com", custom_domain = true }
]

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "none"
run_worker_first = true

[vars]
AUTH_MODE = "site"
SITE_TITLE = "Protected documents"

[observability]
enabled = true
